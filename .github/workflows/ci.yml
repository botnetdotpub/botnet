name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "crates/**"
      - "migrations/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/vps-rolling-deploy.yml"
      - ".github/workflows/botnet-release.yml"
      - "deploy/systemd/**"
      - "deploy/env/**"
      - "scripts/**"
      - "install.sh"

jobs:
  lint:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: botnet-pub-rust
          add-job-id-key: "false"
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Wasm check
        run: cargo check -p identity-web --target wasm32-unknown-unknown

  test:
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: botnet-pub-rust
          add-job-id-key: "false"
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Test
        run: cargo test --workspace

  release-artifact:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: botnet-pub-rust
          add-job-id-key: "false"
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Build release binary for deploy
        run: cargo build --release -p identity-server --locked

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: identity-server-release
          path: target/release/identity-server
          if-no-files-found: error
          retention-days: 3
