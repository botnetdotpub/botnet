name: ci

on:
  push:
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: botnet-pub-rust
          add-job-id-key: "false"

      - name: Format
        run: cargo fmt --all --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Wasm check
        run: cargo check -p identity-web --target wasm32-unknown-unknown

      - name: Build release binary for deploy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: cargo build --release -p identity-server --locked

      - name: Upload release artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: identity-server-release
          path: target/release/identity-server
          if-no-files-found: error
          retention-days: 3
