name: vps-rolling-deploy

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: ["main"]

concurrency:
  group: vps-rolling-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: 0
      CARGO_PROFILE_RELEASE_DEBUG: 0
      SSH_OPTS: -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR

    steps:
      - name: Validate required secrets
        run: |
          missing=()
          [ -z "${{ secrets.VPS_HOST }}" ] && missing+=("VPS_HOST")
          [ -z "${{ secrets.VPS_USER }}" ] && missing+=("VPS_USER")
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing+=("VPS_SSH_KEY")
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            exit 1
          fi
          echo "All required secrets are configured"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download release artifact from CI
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: identity-server-release
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist

      - name: Setup Rust (manual dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts (manual dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: botnet-pub-rust
          add-job-id-key: "false"
          workspaces: |
            . -> target
          cache-on-failure: true

      - name: Build release binary (manual dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        run: cargo build --release -p identity-server --locked

      - name: Prepare deploy bundle
        run: |
          mkdir -p dist
          if [[ ! -f dist/identity-server ]]; then
            cp target/release/identity-server dist/identity-server
          fi
          chmod +x dist/identity-server
          cp deploy/systemd/identity-registry@.service dist/identity-registry@.service
          cp deploy/env/a.env dist/a.env
          cp deploy/env/b.env dist/b.env
          cp scripts/remote_rolling_deploy.sh dist/remote_rolling_deploy.sh
          chmod +x dist/remote_rolling_deploy.sh
          echo "Bundle contents:"
          ls -lh dist/

      - name: Setup SSH key
        run: |
          install -m 600 /dev/null ~/.ssh_deploy_key
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh_deploy_key

      - name: Upload bundle via SCP
        run: |
          VPS_PORT="${{ secrets.VPS_PORT }}"
          scp $SSH_OPTS -i ~/.ssh_deploy_key -P "${VPS_PORT:-22}" \
            dist/* \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/botid-deploy/"

      - name: Install config + rolling restart
        run: |
          VPS_PORT="${{ secrets.VPS_PORT }}"
          ssh $SSH_OPTS -i ~/.ssh_deploy_key -p "${VPS_PORT:-22}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" bash <<'REMOTE'
          set -euo pipefail
          DEPLOY_DIR="$HOME/botid-deploy"

          echo "Deployed files:"
          ls -lh "$DEPLOY_DIR/"

          sudo install -Dm644 "$DEPLOY_DIR/identity-registry@.service" /etc/systemd/system/identity-registry@.service
          sudo install -Dm644 "$DEPLOY_DIR/a.env" /etc/identity-registry/a.env
          sudo install -Dm644 "$DEPLOY_DIR/b.env" /etc/identity-registry/b.env
          sudo install -Dm755 "$DEPLOY_DIR/remote_rolling_deploy.sh" /usr/local/bin/remote_rolling_deploy.sh
          sudo mkdir -p /opt/botid
          sudo chown -R www-data:www-data /opt/botid

          sudo systemctl daemon-reload
          sudo systemctl enable identity-registry@a identity-registry@b
          /usr/local/bin/remote_rolling_deploy.sh "$DEPLOY_DIR/identity-server"

          rm -rf "$DEPLOY_DIR"
          REMOTE

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh_deploy_key
